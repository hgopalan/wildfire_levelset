name: CMake Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Linux & macOS CPU builds ──────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }}, ${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Release, Debug]

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Configure (2D, CPU-only)
        shell: bash
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DLEVELSET_USE_VENDORED_AMREX=ON \
            -DLEVELSET_DIM_2D=ON \
            -DLEVELSET_ENABLE_MPI=OFF \
            -DLEVELSET_ENABLE_EB=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Verify executable exists
        run: test -f build/levelset

  # ── Windows CPU build (AMReX Windows settings: MSVC, no Ninja) ───────────
  build_windows:
    name: Build (windows-latest, ${{ matrix.build_type }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure (2D, CPU-only)
        run: |
          cmake -S . -B build `
            -DCMAKE_VERBOSE_MAKEFILE=ON `
            -DLEVELSET_USE_VENDORED_AMREX=ON `
            -DLEVELSET_DIM_2D=ON `
            -DLEVELSET_ENABLE_MPI=OFF `
            -DLEVELSET_ENABLE_EB=OFF `
            -DLEVELSET_BUILD_WIND_SOLVER=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} -j 4

      - name: Verify executable exists
        shell: pwsh
        run: |
          if (!(Test-Path "build/${{ matrix.build_type }}/levelset.exe" -PathType Leaf)) { exit 1 }

  # ── CUDA build on Linux (Ubuntu) ─────────────────────────────────────────
  build_cuda:
    name: Build CUDA (ubuntu-22.04, Release)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.6.1'
          method: 'network'
          use-github-cache: 'false'

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build

      - name: Configure (2D, CUDA)
        shell: bash
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_VERBOSE_MAKEFILE=ON \
            -DLEVELSET_USE_VENDORED_AMREX=ON \
            -DLEVELSET_DIM_2D=ON \
            -DLEVELSET_ENABLE_MPI=OFF \
            -DLEVELSET_ENABLE_EB=OFF \
            -DLEVELSET_GPU_BACKEND=CUDA \
            -DAMReX_CUDA_ARCH="8.0"

      - name: Build
        run: cmake --build build --parallel

  # ── Linux HIP build (AMD ROCm 6.2.2, Ubuntu 22.04) ──────────────────────
  build_hip:
    name: Build HIP (ubuntu-22.04, Release)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build wget gnupg

      - name: Add ROCm apt repository (Ubuntu 22.04 / jammy)
        run: |
          sudo mkdir -p /etc/apt/keyrings
          wget -q -O - https://repo.radeon.com/rocm/rocm.gpg.key \
            | gpg --dearmor \
            | sudo tee /etc/apt/keyrings/rocm.gpg > /dev/null
          echo 'deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/rocm/apt/6.2.2 jammy main' \
            | sudo tee /etc/apt/sources.list.d/rocm.list
          printf 'Package: *\nPin: release o=repo.radeon.com\nPin-Priority: 600\n' \
            | sudo tee /etc/apt/preferences.d/rocm-pin-600
          sudo apt-get update -qq

      - name: Install ROCm/HIP packages
        # rocm-dev pulls in rocm-device-libs (the bitcode files hipcc/clang++ need).
        # rocrand-dev / rocprim-dev / rocsparse-dev / hiprand-dev are required by AMReX.
        # This mirrors the canonical set used by AMReX, ERF, and AMR-Wind CI.
        run: |
          sudo apt-get install -y --no-install-recommends \
            rocm-dev rocrand-dev rocprim-dev hiprand-dev rocsparse-dev rocm-cmake
          echo 'export PATH=/opt/rocm/llvm/bin:/opt/rocm/bin:$PATH' \
            | sudo tee /etc/profile.d/rocm.sh

      - name: Configure (2D, HIP, gfx90a)
        shell: bash
        run: |
          source /etc/profile.d/rocm.sh
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_VERBOSE_MAKEFILE=ON \
            -DCMAKE_C_COMPILER=$(which clang) \
            -DCMAKE_CXX_COMPILER=$(which clang++) \
            -DLEVELSET_USE_VENDORED_AMREX=ON \
            -DLEVELSET_DIM_2D=ON \
            -DLEVELSET_ENABLE_MPI=OFF \
            -DLEVELSET_ENABLE_EB=OFF \
            -DLEVELSET_GPU_BACKEND=HIP \
            -DLEVELSET_BUILD_WIND_SOLVER=OFF \
            -DAMReX_AMD_ARCH="gfx90a"

      - name: Build
        shell: bash
        run: |
          source /etc/profile.d/rocm.sh
          cmake --build build --parallel

  # ── Linux SYCL build (Intel oneAPI DPC++, Ubuntu 22.04) ──────────────────
  build_sycl:
    name: Build SYCL (ubuntu-22.04, Release)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build wget gnupg

      - name: Add Intel oneAPI apt repository
        run: |
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update -qq

      - name: Install Intel DPC++/C++ compiler and MKL
        # intel-oneapi-mkl-devel is required: AMReX includes <oneapi/mkl/rng.hpp>
        # from AMReX_RandomEngine.H when building for SYCL.
        # This mirrors the canonical set used by AMReX, ERF, and AMR-Wind CI.
        run: |
          sudo apt-get install -y --no-install-recommends \
            intel-oneapi-compiler-dpcpp-cpp \
            intel-oneapi-mkl-devel

      - name: Configure (2D, SYCL)
        shell: bash
        run: |
          source /opt/intel/oneapi/setvars.sh
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_VERBOSE_MAKEFILE=ON \
            -DCMAKE_C_COMPILER=$(which icx) \
            -DCMAKE_CXX_COMPILER=$(which icpx) \
            -DLEVELSET_USE_VENDORED_AMREX=ON \
            -DLEVELSET_DIM_2D=ON \
            -DLEVELSET_ENABLE_MPI=OFF \
            -DLEVELSET_ENABLE_EB=OFF \
            -DLEVELSET_GPU_BACKEND=SYCL \
            -DLEVELSET_BUILD_WIND_SOLVER=OFF

      - name: Build
        shell: bash
        run: |
          source /opt/intel/oneapi/setvars.sh
          cmake --build build --parallel

  # ── Windows + CUDA build ──────────────────────────────────────────────────
  build_windows_cuda:
    name: Build Windows CUDA (windows-2022, Release)
    runs-on: windows-2022

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: '12.6.1'
          sub-packages: '["nvcc", "cudart", "cuda_profiler_api", "cufft_dev", "cusparse_dev", "curand_dev"]'
          method: 'network'
          use-github-cache: 'false'

      - name: Install Ninja
        run: |
          curl.exe -L -o ninja-win.zip https://github.com/ninja-build/ninja/releases/download/v1.11.1/ninja-win.zip
          Expand-Archive -Path ninja-win.zip -DestinationPath .
          echo "$pwd" >> $env:GITHUB_PATH

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure (2D, CUDA)
        run: |
          cmake -S . -B build `
            -G "Ninja" `
            -DCMAKE_VERBOSE_MAKEFILE=ON `
            -DCMAKE_BUILD_TYPE=Release `
            -DLEVELSET_USE_VENDORED_AMREX=ON `
            -DLEVELSET_DIM_2D=ON `
            -DLEVELSET_ENABLE_MPI=OFF `
            -DLEVELSET_ENABLE_EB=OFF `
            -DLEVELSET_BUILD_WIND_SOLVER=OFF `
            -DLEVELSET_GPU_BACKEND=CUDA `
            -DAMReX_CUDA_ARCH="8.0" `
            -DCMAKE_CXX_COMPILER=cl `
            -DCMAKE_CUDA_COMPILER=nvcc
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build AMReX
        run: |
          cmake --build build --config Release --target amrex_2d -j 4
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build
        run: |
          cmake --build build --config Release -j 4
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  # ── Fail-safe regression tests + fcompare (PR / workflow_dispatch only) ───
  regtest_fcompare:
    name: Fail-safe Regression Tests + fcompare
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build python3

      - name: Build levelset (current / PR branch)
        run: |
          cmake -S . -B build_pr -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLEVELSET_USE_VENDORED_AMREX=ON \
            -DLEVELSET_DIM_2D=ON \
            -DLEVELSET_ENABLE_MPI=OFF \
            -DLEVELSET_ENABLE_EB=OFF \
            -DLEVELSET_BUILD_FCOMPARE=ON
          cmake --build build_pr --parallel

      - name: Checkout base branch for reference build
        uses: actions/checkout@v6
        with:
          ref: ${{ github.base_ref || 'main' }}
          path: _base
          submodules: recursive
          fetch-depth: 0

      - name: Build levelset (base branch – reference)
        run: |
          cmake -S _base -B build_base -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLEVELSET_USE_VENDORED_AMREX=ON \
            -DLEVELSET_DIM_2D=ON \
            -DLEVELSET_ENABLE_MPI=OFF \
            -DLEVELSET_ENABLE_EB=OFF
          cmake --build build_base --parallel

      - name: Locate fcompare (built by CMake)
        run: |
          FCOMP=$(find build_pr/external/amrex/Tools/Plotfile -name "amrex_fcompare" -type f 2>/dev/null | head -1)
          if [ -n "$FCOMP" ]; then
            cp "$FCOMP" fcompare
            chmod +x fcompare
            echo "FCOMPARE_AVAILABLE=true" >> "$GITHUB_ENV"
            echo "fcompare located: $FCOMP"
          else
            echo "::warning::amrex_fcompare not found in build tree – comparison will use header check only"
            echo "FCOMPARE_AVAILABLE=false" >> "$GITHUB_ENV"
          fi

      - name: Select fail-safe test cases
        run: |
          python3 - << 'PYEOF'
          import os
          # Fail-safe subset of tests verified to be stable and compatible
          # These tests:
          # 1. Do not require Python setup steps
          # 2. Run quickly (< 60 seconds each)
          # 3. Have minimal dependencies
          # 4. Are compatible with fcompare baseline comparisons
          # 5. Have been verified to pass consistently across builds
          FAILSAFE_TESTS = [
              "surface_spread/basic_levelset",
              "surface_spread/farsite_ellipse",
              "surface_spread/rothermel_fuel",
              "surface_spread/anderson_lw",
              "crown_fire/crown_initiation",
          ]
          # Write to environment for the next step
          with open(os.environ["GITHUB_ENV"], "a") as fenv:
              fenv.write("SELECTED_TESTS=" + "|".join(FAILSAFE_TESTS) + "\n")
          print("Fail-safe regression tests (always tested):")
          for t in FAILSAFE_TESTS:
              print("  " + t)
          print("\nNote: Using curated fail-safe subset instead of random selection")
          print("      to ensure consistent, reliable regression testing.")
          PYEOF

      - name: Run tests, compare with fcompare, report anomalies
        run: |
          python3 - << 'PYEOF'
          import os, subprocess, pathlib, shutil, sys

          selected  = os.environ["SELECTED_TESTS"].split("|")
          exe_pr    = pathlib.Path("build_pr/levelset").resolve()
          exe_base  = pathlib.Path("build_base/levelset").resolve()
          fc_bin    = pathlib.Path("fcompare").resolve()
          have_fc   = (os.environ.get("FCOMPARE_AVAILABLE") == "true"
                       and fc_bin.exists())
          regdir    = pathlib.Path("regtest").resolve()
          summary_f = pathlib.Path(
              os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"))
          DATA_EXTS = ("*.csv", "*.lcp", "*.adj", "*.fmd", "*.fms")
          results   = []
          anomalies = []

          def run_test(exe, work_dir, inputs):
              work_dir.mkdir(parents=True, exist_ok=True)
              for pat in DATA_EXTS:
                  for f in inputs.parent.glob(pat):
                      shutil.copy(f, work_dir)
              try:
                  r = subprocess.run(
                      [str(exe), str(inputs)],
                      capture_output=True, text=True,
                      cwd=work_dir, timeout=300)
                  return r.returncode == 0, r.stdout + r.stderr
              except subprocess.TimeoutExpired:
                  return False, "TIMEOUT"

          def last_plt(work_dir):
              plts = sorted(work_dir.glob("plt[0-9]*"))
              return plts[-1] if plts else None

          def check_header(plt_dir):
              hdr = plt_dir / "Header"
              if not hdr.exists():
                  return False, "no Header file"
              lo = hdr.read_text(errors="replace").lower()
              if "nan" in lo or "inf" in lo:
                  return False, "NaN/Inf detected in Header"
              return True, "ok"

          for test in selected:
              inputs  = regdir / test / "inputs.i"
              slug    = test.replace("/", "_")
              wd_pr   = pathlib.Path(f"run_pr/{slug}").resolve()
              wd_base = pathlib.Path(f"run_base/{slug}").resolve()

              pr_ok,   pr_log   = run_test(exe_pr,   wd_pr,   inputs)
              base_ok, base_log = run_test(exe_base, wd_base, inputs)

              fc_note = ""
              if not pr_ok:
                  anomalies.append(
                      f"**{test}** — PR build FAILED\n"
                      f"```\n{pr_log[-500:]}\n```")
              elif not base_ok:
                  fc_note = "⚠ base run failed (skip fcompare)"
              else:
                  plt_pr   = last_plt(wd_pr)
                  plt_base = last_plt(wd_base)
                  hdr_ok, hdr_msg = (check_header(plt_pr)
                                     if plt_pr else (False, "no plotfile"))
                  if not hdr_ok:
                      anomalies.append(
                          f"**{test}** — header anomaly: {hdr_msg}")
                      fc_note = f"⚠ header: {hdr_msg}"
                  elif have_fc and plt_pr and plt_base:
                      fc_r = subprocess.run(
                          [str(fc_bin), str(plt_base), str(plt_pr)],
                          capture_output=True, text=True, timeout=120)
                      if fc_r.returncode != 0:
                          # Check if failure is only due to "NaN present in both"
                          stdout = fc_r.stdout
                          stderr = fc_r.stderr
                          has_real_diff = False
                          if "ERROR:" in stdout or "ERROR:" in stderr:
                              has_real_diff = True
                          elif "ASSERT" in stdout or "ASSERT" in stderr:
                              has_real_diff = True
                          else:
                              for line in stdout.splitlines():
                                  # If NaNs are present in only one of the runs (asymmetric), it is a real difference.
                                  # We verify that "both" is not in the line to avoid false matching "NaN present in both A and B".
                                  if ("NaN present in A" in line or "NaN present in B" in line) and "both" not in line:
                                      has_real_diff = True
                                      break
                                  if "variable not present" in line:
                                      has_real_diff = True
                                      break
                                  parts = line.strip().split()
                                  # AMReX fcompare output format for variable comparison lines has exactly 3 columns:
                                  # [variable_name, absolute_error, relative_error]
                                  # e.g., "velx                     0.0                     0.0"
                                  # Non-numeric lines (like headers, separators, or metadata 'level = 0')
                                  # are safely filtered out by catching ValueError during float conversion.
                                  if len(parts) == 3:
                                      try:
                                          abs_err = float(parts[1])
                                          rel_err = float(parts[2])
                                          # Exact regression testing: any non-zero error is an exact difference.
                                          if abs_err > 0.0 or rel_err > 0.0:
                                              has_real_diff = True
                                              break
                                      except ValueError:
                                          pass
                          if has_real_diff:
                              snippet = (stdout + stderr)[:800]
                              anomalies.append(
                                  f"**{test}** — fcompare diff:\n"
                                  f"```\n{snippet}\n```")
                              fc_note = "⚠ fcompare diff"
                          else:
                              fc_note = "fcompare ✓ (NaNs matched)"
                      else:
                          fc_note = "fcompare ✓"
                  else:
                      fc_note = ("fcompare n/a (header ok)"
                                 if not have_fc else "no plotfile")

              icon = ("✅" if pr_ok and not fc_note.startswith("⚠")
                      else "❌")
              results.append(
                  f"| {icon} | `{test}` | "
                  f"{'✓' if pr_ok else '✗'} | {fc_note} |")

          with open(summary_f, "w") as f:
              f.write("## Fail-safe Regression Tests + fcompare\n\n")
              f.write("Using curated fail-safe test subset for reliable regression testing.\n\n")
              f.write("| | Test | PR run | fcompare / check |\n")
              f.write("|---|---|---|---|\n")
              for row in results:
                  f.write(row + "\n")
              if anomalies:
                  f.write("\n### ⚠ Anomalies\n\n")
                  for a in anomalies:
                      f.write(a + "\n\n")

          if anomalies:
              print("ANOMALIES DETECTED:")
              for a in anomalies:
                  print(a)
              sys.exit(1)
          else:
              print("All %d tests passed." % len(results))
          PYEOF

