name: CMake Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }}, ${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release, Debug]

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure (3D, CPU-only)
        shell: bash
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DLEVELSET_USE_VENDORED_AMREX=ON \
            -DLEVELSET_DIM_2D=OFF \
            -DLEVELSET_ENABLE_MPI=OFF \
            -DLEVELSET_ENABLE_EB=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Verify executable exists (Linux/macOS)
        if: runner.os != 'Windows'
        run: test -f build/levelset

      - name: Verify executable exists (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Test-Path build/levelset.exe -PathType Leaf
